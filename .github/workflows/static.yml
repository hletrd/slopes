name: 배포 (GitHub Pages)

on:
  push:
    branches: ["master"]

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Minify
        run: npm run build

      - name: Build vinext app
        run: |
          cd slopes-vinext
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build
          # Pre-render index.html for static hosting (vinext is SSR-only)
          PORT=41932 npx vinext start &
          SERVER_PID=$!
          # Wait for server to be ready (up to 10 seconds)
          for i in $(seq 1 10); do
            sleep 1
            if curl -sf http://localhost:41932/ -o dist/client/index.html 2>/dev/null; then
              break
            fi
          done
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          # Validate pre-rendered HTML
          if [ ! -s dist/client/index.html ] || ! grep -q '<html' dist/client/index.html 2>/dev/null; then
            echo "WARNING: Pre-render failed, generating fallback index.html"
            CSS=$(ls dist/client/assets/*.css 2>/dev/null | head -1 | xargs basename 2>/dev/null)
            JS_FILES=$(ls dist/client/assets/*.js 2>/dev/null | xargs -I{} basename {} 2>/dev/null)
            SCRIPT_TAGS=""
            for f in $JS_FILES; do SCRIPT_TAGS="$SCRIPT_TAGS<script type=\"module\" src=\"/vinext/assets/$f\"></script>"; done
            cat > dist/client/index.html << HTMLEOF
          <!DOCTYPE html>
          <html data-theme="dark" lang="ko">
          <head>
            <meta charset="utf-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
            <title>Slopes cam - 전국 스키장 실시간 웹캠 모음</title>
            <meta name="theme-color" content="#121212"/>
            <meta name="apple-mobile-web-app-capable" content="yes"/>
            <link rel="manifest" href="/vinext/manifest.json"/>
            <link rel="icon" href="/vinext/favicon.ico"/>
            <link rel="apple-touch-icon" href="/vinext/icons/skiing-180x180.png"/>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"/>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.23.3/dist/video-js.min.css"/>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@videojs/themes@1/dist/forest/index.css"/>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css"/>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
            <link rel="stylesheet" href="/vinext/assets/$CSS"/>
            <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
            <script src="https://cdn.jsdelivr.net/npm/video.js@8.23.3/dist/alt/video.novtt.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
            <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns" defer></script>
            <script src="https://www.google.com/recaptcha/api.js?render=6LdnzyUsAAAAAKh6eSEaERifPRTh51qnRnpmX6S0" async defer></script>
          </head>
          <body>
            <script>
            (function(){try{var s=localStorage.getItem('webcamSettings');if(s){var p=JSON.parse(s);if(p&&p.darkMode===false){document.body.classList.add('light-mode');document.documentElement.setAttribute('data-theme','light');}}}catch(e){}})();
            </script>
            <div id="root"></div>
            $SCRIPT_TAGS
          </body>
          </html>
          HTMLEOF
          fi
          # Clean old vinext deploy and copy fresh client assets
          rm -rf ../dist/vinext
          mkdir -p ../dist/vinext
          cp -r dist/client/* ../dist/vinext/

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_KEY }}" > private.key
          gpg --batch --import private.key
          rm private.key
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config --local user.email "hletrd@users.noreply.github.com"
          git config --local user.name "hletrd-bot"
          git config --local user.signingkey ${{ env.GPG_KEY_ID }}
          git config --local commit.gpgsign true
          git lfs track "dist/preview.png" || true
          git add .gitattributes

      - name: Commit changes
        run: |
          git add dist/
          git diff --quiet && git diff --staged --quiet || git commit -S -m "[Bot] minify for production"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PAT }}
          branch: ${{ github.ref }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
